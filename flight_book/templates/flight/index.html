<html>
    <head>
        <title>List of flights</title>
    </head>
    <body>

        <h2>List of available flights...</h2>

        {% for flight in flights %}
            <li><a href="{% url 'flight' flight.id%}">{{ flight.origin.city }} to {{ flight.destination.city}}</a></li>
        {% endfor %}
    </body>
</html>
